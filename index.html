<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHMM Incident Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
  :root{--blue:#0055a5;--blue-light:#e8f0fa;--red:#ef3f35;--red-light:#fdecea;--accent:#629DD1;--gray:#6b6b6b;--gray-light:#f4f5f7;--gray-border:#dde1e7;--green:#1a7a1a;--green-light:#e8f5e9;--orange:#e65c00;--orange-light:#fff3e0;--text:#1a1a2e;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'IBM Plex Sans',sans-serif;background:#f0f4f8;color:var(--text);min-height:100vh;}
  header{background:var(--blue);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:4px solid var(--red);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15);}
  header h1{font-size:16px;font-weight:700;}
  header p{font-size:11px;opacity:.75;font-family:'IBM Plex Mono',monospace;margin-top:2px;}
  .header-right{display:flex;align-items:center;gap:16px;}
  .header-stats{display:flex;gap:12px;}
  .stat-pill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 12px;font-size:12px;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:6px;}
  .dot{width:7px;height:7px;border-radius:50%;}.dot-open{background:#ff6b6b;}.dot-closed{background:#51cf66;}
  .sync-status{font-size:11px;font-family:'IBM Plex Mono',monospace;opacity:.85;display:flex;align-items:center;gap:6px;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#51cf66;}
  .sync-dot.syncing{background:#ffd43b;animation:pulse 1s infinite;}
  .sync-dot.error{background:#ff6b6b;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .main{max-width:1100px;margin:0 auto;padding:24px 16px;}
  .top-bar{display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap;}
  button{cursor:pointer;font-family:'IBM Plex Sans',sans-serif;border:none;border-radius:6px;font-weight:600;transition:all .15s;}
  .btn-primary{background:var(--red);color:#fff;padding:10px 20px;font-size:14px;box-shadow:0 2px 6px rgba(239,63,53,.3);}
  .btn-primary:hover{background:#d43029;transform:translateY(-1px);}
  .btn-secondary{background:#fff;color:var(--blue);padding:10px 16px;font-size:13px;border:1.5px solid var(--gray-border);}
  .btn-secondary:hover{border-color:var(--blue);background:var(--blue-light);}
  .filter-group{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto;}
  .filter-btn{background:#fff;border:1.5px solid var(--gray-border);color:var(--gray);padding:6px 14px;font-size:12px;border-radius:20px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'IBM Plex Sans',sans-serif;}
  .filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
  .filter-btn:hover:not(.active){border-color:var(--blue);color:var(--blue);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:12px;width:100%;max-width:580px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;max-height:90vh;overflow-y:auto;}
  .modal-header{background:var(--blue);color:#fff;padding:18px 24px;border-bottom:3px solid var(--red);display:flex;align-items:center;justify-content:space-between;}
  .modal-header h2{font-size:16px;font-weight:700;}
  .modal-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;opacity:.8;}
  .modal-close:hover{opacity:1;}
  .modal-body{padding:24px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .form-row.single{grid-template-columns:1fr;}
  .form-row.three{grid-template-columns:1fr 1fr 1fr;}
  .field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray);margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;font-family:'IBM Plex Sans',sans-serif;font-size:14px;padding:9px 12px;border:1.5px solid var(--gray-border);border-radius:6px;color:var(--text);background:var(--gray-light);transition:border-color .15s;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);background:#fff;}
  .field textarea{resize:vertical;min-height:80px;}
  .modal-footer{padding:16px 24px;background:var(--gray-light);border-top:1px solid var(--gray-border);display:flex;gap:10px;justify-content:flex-end;}
  .incidents-list{display:flex;flex-direction:column;gap:10px;}
  .incident-card{background:#fff;border-radius:10px;border:1.5px solid var(--gray-border);overflow:hidden;transition:box-shadow .15s,border-color .15s;}
  .incident-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);border-color:var(--accent);}
  .incident-card.closed{opacity:.65;}
  .incident-card.closed .card-header{background:var(--gray-light);}
  .card-header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border-bottom:1px solid var(--gray-border);cursor:pointer;flex-wrap:wrap;}
  .cat-badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;}
  .cat-complaint{background:var(--red-light);color:var(--red);}
  .cat-maintenance{background:var(--orange-light);color:var(--orange);}
  .status-badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;flex-shrink:0;}
  .status-open{background:var(--red-light);color:var(--red);}
  .status-closed{background:var(--green-light);color:var(--green);}
  .card-title{font-weight:600;font-size:14px;flex:1;color:var(--text);}
  .card-meta{font-size:11px;color:var(--gray);font-family:'IBM Plex Mono',monospace;flex-shrink:0;}
  .card-body{padding:14px 16px;display:none;border-top:1px solid var(--gray-border);}
  .card-body.open{display:block;}
  .detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
  .detail-item label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray);display:block;margin-bottom:2px;}
  .detail-item span{font-size:13px;color:var(--text);font-weight:500;}
  .detail-section{margin-bottom:10px;}
  .detail-section label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray);display:block;margin-bottom:4px;}
  .detail-section p{font-size:13px;color:var(--text);line-height:1.5;}
  .card-actions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-border);}
  .btn-close-incident{background:var(--green-light);color:var(--green);border:1.5px solid var(--green);padding:6px 14px;font-size:12px;border-radius:6px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;}
  .btn-close-incident:hover{background:var(--green);color:#fff;}
  .btn-reopen{background:var(--orange-light);color:var(--orange);border:1.5px solid var(--orange);padding:6px 14px;font-size:12px;border-radius:6px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;}
  .btn-reopen:hover{background:var(--orange);color:#fff;}
  .btn-edit{background:var(--blue-light);color:var(--blue);border:1.5px solid var(--blue);padding:6px 14px;font-size:12px;border-radius:6px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;}
  .btn-edit:hover{background:var(--blue);color:#fff;}
  .empty-state{text-align:center;padding:60px 20px;color:var(--gray);}
  .empty-state .icon{font-size:48px;margin-bottom:12px;}
  .search-box{flex:1;min-width:200px;}
  .search-box input{width:100%;font-family:'IBM Plex Sans',sans-serif;font-size:14px;padding:9px 14px;border:1.5px solid var(--gray-border);border-radius:6px;background:#fff;color:var(--text);}
  .search-box input:focus{outline:none;border-color:var(--blue);}
  .followup-flag{background:var(--orange-light);color:var(--orange);font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0;}
  .close-note-area{margin-top:10px;}
  .close-note-area textarea{width:100%;font-family:'IBM Plex Sans',sans-serif;font-size:13px;padding:8px 10px;border:1.5px solid var(--gray-border);border-radius:6px;resize:vertical;min-height:60px;background:var(--gray-light);}
  .loading-bar{text-align:center;padding:40px;color:var(--gray);font-size:14px;}
  .error-bar{padding:16px 20px;color:var(--red);font-size:13px;background:var(--red-light);border-radius:8px;margin-bottom:16px;display:none;}
  @media(max-width:600px){.form-row,.form-row.three{grid-template-columns:1fr;}.detail-grid{grid-template-columns:1fr 1fr;}.filter-group{margin-left:0;}.header-stats{display:none;}}
</style>
</head>
<body>
<header>
  <div>
    <h1>⚓ SHMM Incident Log</h1>
    <p>South Haven Municipal Marina · 2026</p>
  </div>
  <div class="header-right">
    <div class="sync-status"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">Connecting...</span></div>
    <div class="header-stats">
      <div class="stat-pill"><span class="dot dot-open"></span><span id="stat-open">0 open</span></div>
      <div class="stat-pill"><span class="dot dot-closed"></span><span id="stat-closed">0 closed</span></div>
    </div>
  </div>
</header>
<div class="main">
  <div class="error-bar" id="errorBar"></div>
  <div class="top-bar">
    <button class="btn-primary" onclick="openModal()">+ New Incident</button>
    <div class="search-box"><input type="text" id="searchInput" placeholder="Search by boater, slip, description..." oninput="renderList()"></div>
    <div class="filter-group">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('open',this)">Open</button>
      <button class="filter-btn" onclick="setFilter('closed',this)">Closed</button>
      <button class="filter-btn" onclick="setFilter('Boater Complaint',this)">Complaints</button>
      <button class="filter-btn" onclick="setFilter('Maintenance',this)">Maintenance</button>
      <button class="filter-btn" onclick="setFilter('followup',this)">Follow-Up ⚑</button>
    </div>
  </div>
  <div class="incidents-list" id="incidentsList"><div class="loading-bar">⏳ Connecting to Google Sheets...</div></div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">New Incident</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="field"><label>Date & Time</label><input type="datetime-local" id="f-datetime"></div>
        <div class="field"><label>Reported By</label><input type="text" id="f-reporter" placeholder="Your name"></div>
      </div>
      <div class="form-row three">
        <div class="field"><label>Category</label>
          <select id="f-category">
            <option value="Boater Complaint">Boater Complaint</option>
            <option value="Maintenance">Maintenance</option>
          </select>
        </div>
        <div class="field"><label>Location</label>
          <select id="f-location">
            <option value="NS">Northside (NS)</option>
            <option value="SS">Southside (SS)</option>
            <option value="MM">Museum Marina (MM)</option>
            <option value="BRP">Black River Park (BRP)</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="field"><label>Slip #</label><input type="text" id="f-slip" placeholder="e.g. 42"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Boater Name</label><input type="text" id="f-boater" placeholder="If known"></div>
        <div class="field"><label>Vessel Name</label><input type="text" id="f-vessel" placeholder="If known"></div>
      </div>
      <div class="form-row single">
        <div class="field"><label>Incident Title / Summary</label><input type="text" id="f-title" placeholder="Brief one-line summary"></div>
      </div>
      <div class="form-row single">
        <div class="field"><label>Description</label><textarea id="f-description" placeholder="What happened?"></textarea></div>
      </div>
      <div class="form-row single">
        <div class="field"><label>Action Taken</label><textarea id="f-action" placeholder="What was done in response?"></textarea></div>
      </div>
      <div class="form-row single">
        <div class="field"><label>Follow-Up Required?</label>
          <select id="f-followup">
            <option value="no">No — resolved</option>
            <option value="yes">Yes — follow-up needed</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="saveBtn" onclick="saveIncident()">Save Incident</button>
    </div>
  </div>
</div>
<script>
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbyL9uqiZ4xDVuuiGQw2yOR3adEvQ1YbBmTki88L2tQq4vZaADttDTUuD9PCou3du9tTew/exec';
var incidents=[],editingId=null,currentFilter='all';
function setSyncStatus(s,l){var d=document.getElementById('syncDot');d.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');document.getElementById('syncLabel').textContent=l;}
function showError(m){var b=document.getElementById('errorBar');b.textContent=m;b.style.display=m?'block':'none';}
async function callScript(payload){
  var url=SCRIPT_URL+'?data='+encodeURIComponent(JSON.stringify(payload));
  var res=await fetch(url);
  var text=await res.text();
  try{return JSON.parse(text);}catch(e){return null;}
}
async function loadFromSheets(){
  setSyncStatus('syncing','Loading...');showError('');
  try{
    var data=await callScript({action:'getAll'});
    if(Array.isArray(data)){incidents=data.filter(function(i){return i.id;}).reverse();setSyncStatus('ok','Synced ✓');}
    else{setSyncStatus('error','Error');showError('Could not load data. Response: '+JSON.stringify(data));}
  }catch(e){setSyncStatus('error','Error');showError('Connection error: '+e.message);}
  renderList();updateStats();
}
async function postToSheets(payload){
  setSyncStatus('syncing','Saving...');
  try{await callScript(payload);setSyncStatus('ok','Saved ✓');showError('');return true;}
  catch(e){setSyncStatus('error','Save failed');showError('Save failed: '+e.message);return false;}
}
function setFilter(f,el){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});el.classList.add('active');renderList();}
function openModal(id){
  editingId=id||null;
  document.getElementById('modalTitle').textContent=id?'Edit Incident':'New Incident';
  if(id){var inc=incidents.find(function(i){return i.id===id;});if(inc){document.getElementById('f-datetime').value=inc.datetime||'';document.getElementById('f-reporter').value=inc.reporter||'';document.getElementById('f-category').value=inc.category||'Boater Complaint';document.getElementById('f-location').value=inc.location||'NS';document.getElementById('f-slip').value=inc.slip||'';document.getElementById('f-boater').value=inc.boater||'';document.getElementById('f-vessel').value=inc.vessel||'';document.getElementById('f-title').value=inc.title||'';document.getElementById('f-description').value=inc.description||'';document.getElementById('f-action').value=inc.action||'';document.getElementById('f-followup').value=inc.followup||'no';}}
  else{document.getElementById('f-datetime').value=new Date().toISOString().slice(0,16);['f-reporter','f-slip','f-boater','f-vessel','f-title','f-description','f-action'].forEach(function(fid){document.getElementById(fid).value='';});document.getElementById('f-category').value='Boater Complaint';document.getElementById('f-location').value='NS';document.getElementById('f-followup').value='no';}
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');editingId=null;}
async function saveIncident(){
  var title=document.getElementById('f-title').value.trim();if(!title){alert('Please enter an incident title.');return;}
  var btn=document.getElementById('saveBtn');btn.textContent='Saving...';btn.disabled=true;
  var existing=editingId?incidents.find(function(i){return i.id===editingId;}):null;
  var inc={action:'save',id:editingId||Date.now().toString(),datetime:document.getElementById('f-datetime').value,reporter:document.getElementById('f-reporter').value,category:document.getElementById('f-category').value,location:document.getElementById('f-location').value,slip:document.getElementById('f-slip').value,boater:document.getElementById('f-boater').value,vessel:document.getElementById('f-vessel').value,title:title,description:document.getElementById('f-description').value,action:document.getElementById('f-action').value,followup:document.getElementById('f-followup').value,status:existing?existing.status:'open',closedAt:existing?existing.closedAt:'',closeNote:existing?existing.closeNote:''};
  await postToSheets(inc);await loadFromSheets();closeModal();btn.textContent='Save Incident';btn.disabled=false;
}
function toggleCard(id){var b=document.getElementById('body-'+id);if(b)b.classList.toggle('open');}
async function closeIncident(id){var note=document.getElementById('close-note-'+id);var inc=incidents.find(function(i){return i.id===id;});if(!inc)return;await postToSheets(Object.assign({},inc,{action:'save',status:'closed',closedAt:new Date().toISOString(),closeNote:note?note.value:''}));await loadFromSheets();}
async function reopenIncident(id){var inc=incidents.find(function(i){return i.id===id;});if(!inc)return;await postToSheets(Object.assign({},inc,{action:'save',status:'open',closedAt:'',closeNote:''}));await loadFromSheets();}
function updateStats(){document.getElementById('stat-open').textContent=incidents.filter(function(i){return i.status==='open';}).length+' open';document.getElementById('stat-closed').textContent=incidents.filter(function(i){return i.status!=='open';}).length+' closed';}
function formatDate(dt){if(!dt)return'—';try{var d=new Date(dt);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}catch(e){return dt;}}
function renderList(){
  var query=document.getElementById('searchInput').value.toLowerCase();
  var list=incidents.filter(function(inc){var mf=true;if(currentFilter==='open')mf=inc.status==='open';else if(currentFilter==='closed')mf=inc.status==='closed';else if(currentFilter==='followup')mf=inc.followup==='yes'&&inc.status==='open';else if(currentFilter==='Boater Complaint')mf=inc.category==='Boater Complaint';else if(currentFilter==='Maintenance')mf=inc.category==='Maintenance';var ms=!query||[inc.title,inc.boater,inc.vessel,inc.slip,inc.description,inc.reporter].some(function(f){return f&&f.toString().toLowerCase().includes(query);});return mf&&ms;});
  var c=document.getElementById('incidentsList');
  if(!list.length){c.innerHTML='<div class="empty-state"><div class="icon">📋</div><p>No incidents found.</p></div>';return;}
  c.innerHTML=list.map(function(inc){
    var cc=inc.category==='Maintenance'?'cat-maintenance':'cat-complaint';
    var sc=inc.status==='closed'?'status-closed':'status-open';
    var cl=inc.status==='closed'?'closed':'';
    var fu=inc.followup==='yes'&&inc.status==='open'?'<span class="followup-flag">⚑ Follow-up</span>':'';
    var ab=inc.status==='open'?'<div class="close-note-area"><textarea id="close-note-'+inc.id+'" placeholder="Close-out notes (optional)..."></textarea></div><div class="card-actions"><button class="btn-close-incident" onclick="closeIncident(\''+inc.id+'\')">✓ Close Out</button><button class="btn-edit" onclick="openModal(\''+inc.id+'\')">✏ Edit</button></div>':'<div class="card-actions"><button class="btn-reopen" onclick="reopenIncident(\''+inc.id+'\')">↩ Reopen</button><button class="btn-edit" onclick="openModal(\''+inc.id+'\')">✏ Edit</button></div>';
    return '<div class="incident-card '+cl+'"><div class="card-header" onclick="toggleCard(\''+inc.id+'\')"><span class="cat-badge '+cc+'">'+inc.category+'</span><span class="card-title">'+inc.title+'</span>'+fu+'<span class="status-badge '+sc+'">'+(inc.status==='closed'?'✓ Closed':'● Open')+'</span><span class="card-meta">'+inc.location+(inc.slip?' #'+inc.slip:'')+' · '+formatDate(inc.datetime)+'</span></div><div class="card-body" id="body-'+inc.id+'"><div class="detail-grid"><div class="detail-item"><label>Reported By</label><span>'+(inc.reporter||'—')+'</span></div><div class="detail-item"><label>Boater</label><span>'+(inc.boater||'—')+'</span></div><div class="detail-item"><label>Vessel</label><span>'+(inc.vessel||'—')+'</span></div></div>'+(inc.description?'<div class="detail-section"><label>Description</label><p>'+inc.description+'</p></div>':'')+(inc.action?'<div class="detail-section"><label>Action Taken</label><p>'+inc.action+'</p></div>':'')+(inc.closeNote?'<div class="detail-section"><label>Close-Out Notes</label><p>'+inc.closeNote+'</p></div>':'')+(inc.closedAt?'<div class="detail-section"><label>Closed</label><p>'+formatDate(inc.closedAt)+'</p></div>':'')+ab+'</div></div>';
  }).join('');
}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
loadFromSheets();
setInterval(loadFromSheets,60000);
</script>
</body>
</html>
